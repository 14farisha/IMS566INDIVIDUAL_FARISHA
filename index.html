<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portal Pelajar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Background Container -->
<div id="vanta-bg" style="position:fixed; width:100%; height:100%; top:0; left:0; z-index:-1;"></div>

<!-- Content -->
<div class="d-flex justify-content-center align-items-center" style="height:100vh; position:relative; z-index:1;">
  <div class="card shadow" style="width:400px;">
    <div class="card-body">
      <h3 class="text-center mb-4"> Portal Pelajar</h3>
      <form onsubmit="return loginUser()">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="username" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control">
        </div>
        <!-- Mesej invalid -->
        <div id="error-msg" class="text-danger mb-3" style="display:none;">
          Invalid email atau password!
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
<script>
  VANTA.BIRDS({
    el: "#vanta-bg",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 200.00,
    minWidth: 200.00,
    scale: 1.00,
    scaleMobile: 1.00
  });

  function loginUser() {
    const email = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("error-msg");

    // contoh hardcoded login
    if (email === "student@example.com" && password === "1234") {
      window.location.href = "dashboard.html";
      return false;
    } else {
      errorMsg.style.display = "block"; // tunjuk mesej merah
      return false;
    }
  }
</script>

</body>
</html>
